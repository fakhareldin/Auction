version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: haraj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: haraj_user
      POSTGRES_PASSWORD: haraj_password
      POSTGRES_DB: haraj_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U haraj_user -d haraj_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haraj-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
